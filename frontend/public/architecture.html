<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TutoriAI — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8fafc;
    --ink: #0f172a;
    --muted: #64748b;
    --line: #334155;
    --fe: #3b82f6;
    --fe-bg: #eff6ff;
    --be: #10b981;
    --be-bg: #ecfdf5;
    --api: #f59e0b;
    --api-bg: #fffbeb;
    --el: #111827;
    --el-bg: #f3f4f6;
    --hg: #7c3aed;
    --hg-bg: #f5f3ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 18px 28px 24px;
    min-height: 100vh;
  }
  header { max-width: 1312px; margin: 0 auto 12px; }
  h1 {
    font-size: 1.9rem;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .sub {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 4px;
  }
  main { max-width: 1312px; margin: 0 auto; }
  svg { width: 100%; height: auto; max-height: calc(100vh - 110px); display: block; margin: 0 auto; }

  /* Box fills, via <rect class="..."> */
  .box-fe   { fill: var(--fe-bg);  stroke: var(--fe);  stroke-width: 2; }
  .box-be   { fill: var(--be-bg);  stroke: var(--be);  stroke-width: 2; }
  .box-api  { fill: var(--api-bg); stroke: var(--api); stroke-width: 2; }
  .box-el   { fill: var(--el-bg);  stroke: var(--el);  stroke-width: 2.4; }
  .box-hg   { fill: var(--hg-bg);  stroke: var(--hg);  stroke-width: 2.4; }
  .box-inner { fill: #fff; stroke: #cbd5e1; stroke-width: 1.2; }

  .t-title  { font-size: 28px; font-weight: 700; }
  .t-sub    { font-size: 14px; fill: var(--muted); }
  .t-body   { font-size: 16px; }
  .t-inner-title { font-size: 18px; font-weight: 600; }
  .t-inner-sub   { font-size: 13px; fill: var(--muted); }

  .fe-title { fill: var(--fe); }
  .be-title { fill: var(--be); }
  .api-title{ fill: var(--api); }
  .el-title { fill: var(--el); }
  .hg-title { fill: var(--hg); }

  .edge { stroke: var(--line); stroke-width: 2; fill: none; }
  .edge-dashed { stroke-dasharray: 6 5; }
  .edge-label {
    font-size: 17px;
    font-weight: 600;
    fill: var(--ink);
    paint-order: stroke;
    stroke: #f8fafc;
    stroke-width: 6;
    stroke-linejoin: round;
  }
  .edge-sub {
    font-size: 13px;
    fill: var(--muted);
    paint-order: stroke;
    stroke: #f8fafc;
    stroke-width: 5;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<header>
  <h1>TutoriAI — Architecture</h1>
  <div class="sub">Personalized tutoring</div>
</header>

<main>
<svg viewBox="0 0 1640 1240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TutoriAI architecture">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-start" viewBox="0 0 10 10" refX="0.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- ============== LEFT COLUMN ============== -->

  <!-- FRONTEND -->
  <rect class="box-fe" x="40" y="40" width="420" height="293" rx="14"/>
  <text class="t-title fe-title" x="250" y="102" text-anchor="middle">Frontend</text>
  <image href="https://cdn.simpleicons.org/react/61DAFB"       x="96"  y="138" width="44" height="44"/>
  <image href="https://cdn.simpleicons.org/vite/646CFF"        x="205" y="138" width="44" height="44"/>
  <image href="https://cdn.simpleicons.org/tailwindcss/06B6D4" x="314" y="138" width="44" height="44"/>
  <text class="t-sub" x="118" y="203" text-anchor="middle">React</text>
  <text class="t-sub" x="227" y="203" text-anchor="middle">Vite</text>
  <text class="t-sub" x="336" y="203" text-anchor="middle">Tailwind</text>
  <text class="t-body" x="250" y="258" text-anchor="middle">Learn mode · Teach mode · visuals</text>
  <text class="t-sub"  x="250" y="284" text-anchor="middle">browser SPA (deployed on Vercel)</text>

  <!-- BACKEND -->
  <rect class="box-be" x="40" y="413" width="420" height="293" rx="14"/>
  <text class="t-title be-title" x="250" y="472" text-anchor="middle">Backend</text>
  <image href="https://cdn.simpleicons.org/express/000000"     x="145" y="508" width="50" height="50"/>
  <image href="https://cdn.simpleicons.org/nodedotjs/339933"   x="305" y="508" width="50" height="50"/>
  <text class="t-sub" x="170" y="578" text-anchor="middle">Express</text>
  <text class="t-sub" x="330" y="578" text-anchor="middle">Node</text>
  <text class="t-body" x="250" y="620" text-anchor="middle">session minting · tool webhooks</text>
  <text class="t-body" x="250" y="644" text-anchor="middle">transcript grading</text>

  <!-- APIs (Tavily + Gemini) -->
  <rect class="box-api" x="40" y="786" width="420" height="294" rx="14"/>
  <text class="t-title api-title" x="250" y="846" text-anchor="middle">APIs</text>
  <text class="t-sub" x="250" y="872" text-anchor="middle">grounding &amp; grading</text>

  <rect class="box-inner" x="72"  y="900" width="170" height="150" rx="10"/>
  <text class="t-inner-title" x="157" y="952" text-anchor="middle">Tavily</text>
  <text class="t-inner-sub"   x="157" y="980" text-anchor="middle">web search</text>
  <text class="t-inner-sub"   x="157" y="1000" text-anchor="middle">grounding</text>

  <rect class="box-inner" x="258" y="900" width="170" height="150" rx="10"/>
  <image href="https://cdn.simpleicons.org/googlegemini/4285F4" x="330" y="912" width="26" height="26"/>
  <text class="t-inner-title" x="343" y="970" text-anchor="middle">Gemini 2.5</text>
  <text class="t-inner-sub"   x="343" y="994" text-anchor="middle">Teach-mode grader</text>

  <!-- ============== RIGHT COLUMN ============== -->

  <!-- ELEVENLABS CONVAI (big container, 6 agents inside) -->
  <rect class="box-el" x="540" y="40" width="1060" height="560" rx="16"/>
  <image href="https://cdn.simpleicons.org/elevenlabs/000000" x="620" y="70" width="44" height="44"/>
  <text class="t-title el-title" x="1070" y="100" text-anchor="middle">ElevenLabs Convai</text>
  <text class="t-sub" x="1070" y="126" text-anchor="middle">STT · LLM · TTS · tool orchestration · 6 tutor agents</text>

  <!-- 6 agents, 3 cols × 2 rows -->
  <rect class="box-inner" x="566"  y="160" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="731" y="270" text-anchor="middle">Alex</text>
  <text class="t-inner-sub"   x="731" y="294" text-anchor="middle">Learn · illustrated</text>

  <rect class="box-inner" x="911"  y="160" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="1076" y="270" text-anchor="middle">Mila</text>
  <text class="t-inner-sub"   x="1076" y="294" text-anchor="middle">Teach · illustrated</text>

  <rect class="box-inner" x="1256" y="160" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="1421" y="270" text-anchor="middle">Ann</text>
  <text class="t-inner-sub"   x="1421" y="294" text-anchor="middle">Math</text>

  <rect class="box-inner" x="566"  y="380" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="731" y="490" text-anchor="middle">Shawn</text>
  <text class="t-inner-sub"   x="731" y="514" text-anchor="middle">History</text>

  <rect class="box-inner" x="911"  y="380" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="1076" y="490" text-anchor="middle">Katya</text>
  <text class="t-inner-sub"   x="1076" y="514" text-anchor="middle">Interview</text>

  <rect class="box-inner" x="1256" y="380" width="330" height="200" rx="10"/>
  <text class="t-inner-title" x="1421" y="490" text-anchor="middle">Graham</text>
  <text class="t-inner-sub"   x="1421" y="514" text-anchor="middle">English</text>

  <!-- HEYGEN (big container, 4 avatars inside) -->
  <rect class="box-hg" x="540" y="680" width="1060" height="400" rx="16"/>
  <text class="t-title hg-title" x="1070" y="740" text-anchor="middle">HeyGen</text>
  <text class="t-sub" x="1070" y="766" text-anchor="middle">LiveAvatar · LITE mode · streams to browser over WebRTC (LiveKit)</text>

  <!-- 4 avatars, 4 cols × 1 row -->
  <rect class="box-inner" x="566"  y="810" width="240" height="220" rx="10"/>
  <text class="t-inner-title" x="686" y="920" text-anchor="middle">Ann</text>
  <text class="t-inner-sub"   x="686" y="944" text-anchor="middle">Math</text>

  <rect class="box-inner" x="822"  y="810" width="240" height="220" rx="10"/>
  <text class="t-inner-title" x="942" y="920" text-anchor="middle">Shawn</text>
  <text class="t-inner-sub"   x="942" y="944" text-anchor="middle">History</text>

  <rect class="box-inner" x="1078" y="810" width="240" height="220" rx="10"/>
  <text class="t-inner-title" x="1198" y="920" text-anchor="middle">Katya</text>
  <text class="t-inner-sub"   x="1198" y="944" text-anchor="middle">Interview</text>

  <rect class="box-inner" x="1334" y="810" width="240" height="220" rx="10"/>
  <text class="t-inner-title" x="1454" y="920" text-anchor="middle">Graham</text>
  <text class="t-inner-sub"   x="1454" y="944" text-anchor="middle">English</text>

  <!-- ============== ARROWS ============== -->

  <!-- Frontend ↔ Backend -->
  <line class="edge" x1="250" y1="333" x2="250" y2="413"
        marker-start="url(#arr-start)" marker-end="url(#arr)"/>
  <text class="edge-label" x="268" y="378" text-anchor="start">REST + SSE</text>

  <!-- Backend → APIs -->
  <line class="edge" x1="250" y1="706" x2="250" y2="786" marker-end="url(#arr)"/>
  <text class="edge-label" x="268" y="750" text-anchor="start">search + grade</text>

  <!-- Frontend → ElevenLabs (voice stream, WebSocket, direct from browser) -->
  <line class="edge" x1="460" y1="170" x2="540" y2="170" marker-end="url(#arr)"/>
  <text class="edge-label" x="500" y="158" text-anchor="middle">voice stream</text>
  <text class="edge-sub"   x="500" y="192" text-anchor="middle" style="fill: #334155; font-weight:600">WebSocket</text>

  <!-- Backend → ElevenLabs (tool webhooks) -->
  <line class="edge" x1="460" y1="440" x2="540" y2="440" marker-end="url(#arr)"/>
  <text class="edge-label" x="500" y="428" text-anchor="middle">tool webhooks</text>

  <!-- Backend → HeyGen (session minting) -->
  <path class="edge" d="M 460 665 L 515 665 L 515 825 L 540 825" marker-end="url(#arr)" fill="none"/>
  <text class="edge-label" x="525" y="660" text-anchor="start">session minting</text>

  <!-- ElevenLabs ↔ HeyGen (server-to-server, internal) -->
  <line class="edge edge-dashed" x1="1070" y1="600" x2="1070" y2="680"
        marker-start="url(#arr-start)" marker-end="url(#arr)"/>
  <text class="edge-label" x="1088" y="644" text-anchor="start">server ↔ server</text>
</svg>
</main>

</body>
</html>
